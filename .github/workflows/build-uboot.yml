name: Build LIME2 U-Boot
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Build u-boot
        run: |
          ./compile.sh u-boot \
            BOARD=lime2 \
            BRANCH=current \
            EXPERT=yes
      - name: List output
        run: find output/debs -name "*.deb" 2>/dev/null || echo "no debs found"
      - name: Upload u-boot
        uses: actions/upload-artifact@v4
        with:
          name: lime2-uboot
          path: output/debs/linux-u-boot-lime2*.deb
          retention-days: 7
