name: Build LIME2 Kernel
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get kernel source and show lvds file
        run: |
          sudo apt-get install -y git
          git clone --depth=1 -b linux-7.0.y https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux-src 2>/dev/null || \
          git clone --depth=1 https://github.com/torvalds/linux.git linux-src
          cat linux-src/drivers/gpu/drm/sun4i/sun4i_lvds.c
