name: Build LIME2 Kernel
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check kernel source
        run: |
          sudo apt-get install -y git
          git clone --depth=1 -b linux-7.0.y \
            https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git src
          grep -n "sun4i_tcon_setup_lvds_phy\|sun7i_a20_tcon0_quirks\|LVDS_ANA0_CK_EN\|LVDS_ANA1_REG" \
            src/drivers/gpu/drm/sun4i/sun4i_tcon.c \
            src/drivers/gpu/drm/sun4i/sun4i_tcon.h 2>/dev/null | head -40

      - name: Build kernel
        run: |
          ./compile.sh kernel \
            BOARD=lime2 \
            BRANCH=edge \
            RELEASE=trixie \
            BUILD_MINIMAL=yes \
            KERNEL_ONLY=yes \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            COMPRESS_OUTPUTIMAGE=no

      - name: Upload kernel deb
        uses: actions/upload-artifact@v4
        with:
          name: lime2-kernel-panel-lvds
          path: output/debs/linux-image-edge-sunxi*.deb
