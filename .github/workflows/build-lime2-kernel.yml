name: Build LIME2 Kernel and U-Boot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build kernel
        run: |
          ./compile.sh kernel \
            BOARD=lime2 \
            BRANCH=edge \
            RELEASE=trixie \
            BUILD_MINIMAL=yes \
            KERNEL_ONLY=yes \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            COMPRESS_OUTPUTIMAGE=no

      - name: Build u-boot
        run: |
          ./compile.sh u-boot \
            BOARD=lime2 \
            BRANCH=current \
            EXPERT=yes

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lime2-kernel-uboot
          path: |
            output/debs/linux-image-edge-sunxi*.deb
            output/debs/linux-u-boot-lime2*.deb
          retention-days: 7
